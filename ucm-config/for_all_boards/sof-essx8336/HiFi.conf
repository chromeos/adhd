SectionVerb {
	Value.FullySpecifiedUCM "1"
	EnableSequence [
		disdevall ""
		# the default volume was too quiet for some sources
		# and 100% was so loud that the lowest notch was still quite loud
		# this value can be nudged based on QE/customer feedback
		cset "name='DAC Playback Volume' 80%"
	]
}

SectionDevice."Speaker" {
	Comment "Speakers"

	EnableSequence [
		cset "name='Speaker Switch' on"
		cset "name='Left Headphone Mixer LLIN Switch' on"
		cset "name='Left Headphone Mixer Left DAC Switch' on"
		cset "name='Right Headphone Mixer RLIN Switch' on"
		cset "name='Right Headphone Mixer Right DAC Switch' on"
	]

	DisableSequence [
		cset "name='Speaker Switch' off"
	]

	Value {
		PlaybackPriority 100
		PlaybackPCM "hw:0,0"
		PlaybackMixerElem "Headphone Mixer"
		PlaybackMasterElem "DAC"
	}
}

SectionDevice."Headphone" {
        Comment "Headphones"
	EnableSequence [
		cset "name='Speaker Switch' off"
		cset "name='Left Headphone Mixer LLIN Switch' on"
		cset "name='Left Headphone Mixer Left DAC Switch' on"
		cset "name='Right Headphone Mixer RLIN Switch' on"
		cset "name='Right Headphone Mixer Right DAC Switch' on"
	]

	DisableSequence [
		cset "name='Speaker Switch' on"
	]
	Value {
		PlaybackPriority 200
		PlaybackPCM "hw:0,0"
		PlaybackMixerElem "Headphone Mixer"
		PlaybackMasterElem "DAC"
		JackControl "Headphone Jack"
	}
}
